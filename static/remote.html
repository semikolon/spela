<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b0b0f">
<title>spela remote</title>
<!--
  T-1 stub (web-remote spec, Phase 1 "dependency root"). The full dark SPA
  shell — hash-routed Search / My Library / Now-Playing, poster grid,
  optimistic transport, phone-direct HLS — is Phase 3+ (tasks.md T-5..T-15).
  This stub exists so /remote 200s and the static-serve plumbing
  (include_str! + serve_static_with_range mirror of /cast-receiver.html) is
  verifiable before the SPA lands. Dark-first paint here already so Phase 3
  inherits a no-theme-flash baseline (NFR-1).
-->
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; height: 100%;
    background: #0b0b0f; color: #e8e8ee;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    box-sizing: border-box;
  }
  .mark { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; }
  .sub  { margin-top: 0.35rem; color: #8a8a99; font-size: 0.95rem; }
  .dot  { margin-top: 1.5rem; color: #5a5a6a; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="mark">spela</div>
    <div class="sub">remote</div>
    <div class="dot">SPA shell loads here (Phase 3) — backend live</div>
  </div>
</body>
</html>
