<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0b0b0f">
<title>spela remote</title>
<!--
  web-remote SPA — Phase 3 (shell + grid + API client) + Phase 4 (search +
  hybrid play + target picker + now-playing + scrubber). Single no-build
  asset, served same-origin from /remote (mirrors /cast-receiver.html).
  Phase 5 (My Library view) + Phase 6 (in-browser phone playback) are not
  built yet; the nav/target entries for them are honest placeholders, not
  broken states (spec embarrassment criteria). Built against the verified
  live spela contracts (not the spec's assumed ones).
-->
<style>
  :root{
    color-scheme:dark;
    --bg:#0b0b0f; --bg2:#15151c; --bg3:#1f1f29; --line:#2a2a36;
    --fg:#e8e8ee; --dim:#8a8a99; --dim2:#5a5a6a;
    --accent:#5b8cff; --accent2:#3a64d8; --good:#37c87a; --warn:#e0a23a; --bad:#e0564a;
    --r:14px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body{display:flex;flex-direction:column;min-height:100%}
  button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
  input{font:inherit}
  a{color:var(--accent);text-decoration:none}

  /* ---- top bar ---- */
  header{position:sticky;top:0;z-index:20;background:rgba(11,11,15,.92);
    backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line);
    padding:calc(.6rem + var(--safe-t)) .8rem .6rem;display:flex;align-items:center;gap:.6rem}
  .brand{font-weight:800;letter-spacing:-.02em;font-size:1.15rem;color:var(--fg);cursor:pointer}
  .brand small{color:var(--dim2);font-weight:600;font-size:.7rem;margin-left:.3rem}
  nav{display:flex;gap:.15rem;margin-left:.4rem;background:var(--bg2);border-radius:999px;padding:.2rem}
  nav a{color:var(--dim);padding:.32rem .7rem;border-radius:999px;font-size:.85rem;font-weight:600}
  nav a.on{color:var(--fg);background:var(--bg3)}
  .tgt{margin-left:auto;display:flex;align-items:center;gap:.35rem;background:var(--bg2);
    border:1px solid var(--line);border-radius:999px;padding:.34rem .7rem;font-size:.82rem;max-width:46vw}
  .tgt b{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tgt .dot{width:7px;height:7px;border-radius:50%;background:var(--dim2);flex:none}
  .tgt.set .dot{background:var(--good)}

  main{flex:1;padding:.8rem;padding-bottom:8rem}
  .view{display:none;animation:fade .18s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ---- search ---- */
  /* 2026-07-13: search box + Movies/TV selector always on ONE line (row, no
     wrap) — input flexes to fill, selector keeps intrinsic width. Fits phone→
     desktop (input shrinks; selector never does). */
  .searchbar{display:flex;flex-direction:row;align-items:center;gap:.6rem;margin-bottom:1rem}
  .searchbar input{flex:1 1 auto;min-width:0;background:var(--bg2);border:1px solid var(--line);
    border-radius:var(--r);padding:.85rem 1rem;color:var(--fg)}
  .searchbar input:focus{outline:2px solid var(--accent2);outline-offset:0}
  .seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:999px;
    padding:.2rem;flex:0 0 auto}
  .seg button{padding:.3rem .9rem;border-radius:999px;color:var(--dim);font-size:.84rem;font-weight:600}
  .seg button.on{background:var(--accent2);color:#fff}

  /* ---- poster grid / card ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem;
    content-visibility:auto;contain-intrinsic-size:auto 280px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);
    overflow:hidden;display:flex;flex-direction:column}
  .poster{position:relative;aspect-ratio:2/3;background:linear-gradient(135deg,var(--bg3),var(--bg2))}
  .poster img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .25s}
  .poster img.in{opacity:1}
  .poster .shimmer{position:absolute;inset:0;background:linear-gradient(100deg,
    var(--bg2) 30%,var(--bg3) 50%,var(--bg2) 70%);background-size:200% 100%;
    animation:sh 1.2s linear infinite}
  @keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}
  .poster .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:.8rem;color:var(--dim);font-weight:700;font-size:.95rem}
  .meta{padding:.6rem .7rem}
  .meta .t{font-weight:700;font-size:.95rem;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta .y{color:var(--dim);font-size:.8rem;margin-top:.15rem}
  .card .play{margin:.55rem .7rem .7rem;background:var(--accent2);color:#fff;
    border-radius:10px;padding:.55rem;font-weight:700;font-size:.88rem;text-align:center}
  .card .play:active{transform:scale(.98)}
  .src-toggle{margin:0 .7rem .7rem;color:var(--accent);font-size:.8rem;font-weight:600;text-align:center}
  .sources{margin:0 .55rem .65rem;display:none;flex-direction:column;gap:.3rem}
  .sources.open{display:flex}
  .src{display:flex;gap:.5rem;align-items:center;background:var(--bg3);border:1px solid var(--line);
    border-radius:9px;padding:.5rem .6rem;font-size:.78rem}
  .src:active{border-color:var(--accent2)}
  .src .q{font-weight:700;color:var(--fg)}
  .src .x{color:var(--dim)}
  .src .s{margin-left:auto;color:var(--good);font-weight:700;white-space:nowrap}
  /* 2026-07-04: seed health — amber = low (may be slow), red = dead (likely
     won't start). Mirrors the green "on disk" style so slow sources are visible. */
  .src .s.low{color:var(--warn)}
  .src .s.dead{color:var(--bad)}
  .src.dead{border-color:var(--bad);background:linear-gradient(90deg,rgba(224,86,74,.13),var(--bg3))}
  /* 2026-06-30: a source already (part-)downloaded on disk — tapping it resumes
     (librqbit overwrite:true) instead of re-fetching that fraction. */
  .src.partial{border-color:var(--good);background:linear-gradient(90deg,rgba(55,200,122,.16),var(--bg3))}
  .src .dl{color:var(--good);font-weight:800;white-space:nowrap}
  .src-toggle.has-partial{color:var(--good)}
  /* 2026-07-13: "Continue watching" row (spela-native tracker, slice 1) */
  .recent{display:none;margin:.2rem 0 .4rem}
  .recent.on{display:block}
  .recent .rlab{color:var(--dim);font-size:.72rem;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;margin:.1rem .15rem .4rem}
  .recent .chips{display:flex;flex-wrap:wrap;gap:.5rem;padding-bottom:.3rem}
  .recent .chip{flex:0 0 auto;background:var(--bg3);border:1px solid var(--line);
    border-radius:11px;padding:.5rem .8rem;font-size:.82rem;font-weight:600;color:var(--fg);
    white-space:nowrap;max-width:62vw;overflow:hidden;text-overflow:ellipsis;touch-action:manipulation}
  .recent .chip .ep{color:var(--dim);font-weight:500;margin-left:.35rem;font-size:.76rem}
  .recent .chip:active{border-color:var(--accent2);transform:scale(.97)}
  /* To-Watch section headers — small all-caps, x-aligned with row titles
     (padding-left matches .src row inner padding), equal vertical margins. */
  .twhead{color:var(--dim);font-size:.7rem;font-weight:800;letter-spacing:.09em;
    text-transform:uppercase;margin:.95rem 0;padding-left:.7rem}
  .twhead:first-child{margin-top:.25rem}
  /* 2026-07-13: To-Watch rows get a half-faded poster background + the release
     year after the title (both TMDB-fetched via /title-meta, lazy + cached). */
  /* Single-line rows: title truncates with ellipsis (it's what varies most),
     year/note/score stay fixed → every row is the same height, titles stay
     left-aligned (no wrap-induced centering). The grid cells are minmax(0,1fr)
     so the flex title can shrink below its content width. */
  #towatchOut .src{flex-wrap:nowrap;overflow:hidden}
  #towatchOut .src .q{flex:0 1 auto;min-width:0;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;text-align:left}
  #towatchOut .src .ty{flex:0 0 auto;white-space:nowrap;color:var(--dim);
    font-weight:600;font-size:.82rem;margin-left:.45rem}
  #towatchOut .src .x{flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
  #towatchOut .src .s{flex:0 0 auto}
  #towatchOut .src{transition:background-image .3s ease}
  /* 2026-07-14: list fills the viewport (was capped at .detail's 940px, leaving
     the right half empty), responsive columns, ~2% right margin. Extra fields
     (runtime/seasons + status) ride along, hidden on narrow phones where there's
     no room. */
  #towatchOut .detail{max-width:none;padding-right:2vw}
  /* Fill the viewport at 2 columns max (wider viewport = wider rows, never
     narrower — 3 columns made cells narrower than 2-col-at-medium and starved
     the title). Each row is a query CONTAINER so the extras drop by the ROW's
     own width (below), keeping the title readable at any width. */
  #towatchOut .src{container-type:inline-size}
  #towatchOut .src .mx{flex:0 0 auto;white-space:nowrap;color:var(--dim);font-size:.8rem;margin-left:.45rem}
  #towatchOut .src .stx{flex:0 0 auto;white-space:nowrap;font-size:.68rem;font-weight:700;margin-left:.5rem;
    padding:.1rem .42rem;border-radius:6px;border:1px solid var(--line);color:var(--dim)}
  #towatchOut .src .stx.on{color:var(--good);border-color:rgba(55,200,122,.5)}
  /* Drop the lower-priority extras as the ROW narrows (status → seasons →
     genre), so the title keeps its space instead of collapsing to "C". Year +
     RT score + title always stay. Row-width based (container query), so it's
     correct at any column width / viewport. */
  @container (max-width:520px){ #towatchOut .src .stx{display:none} }
  @container (max-width:450px){ #towatchOut .src .mx{display:none} }
  @container (max-width:390px){ #towatchOut .src .gx{display:none} }
  /* 2026-07-13: "Mark watched" secondary button on the search detail card. */
  .markw{background:var(--bg3);border:1px solid var(--line);border-radius:12px;
    padding:.55rem 1rem;color:var(--fg);font-weight:700;font-size:.9rem;min-height:48px;
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .markw:active{transform:scale(.97);border-color:var(--accent2)}
  .markw.done{color:var(--good);border-color:var(--good);background:rgba(55,200,122,.1)}
  .card .markw{margin:.5rem .7rem 0}
  .detail .body>.markw{margin:.6rem 0 0;max-width:260px}
  /* 2026-07-13: "Rotten Tomatoes →" read-more link on the search detail card.
     Uses RT's search URL (always lands on the title; hand-built /m/ slugs 404
     on disambiguated titles). Works for movies AND series, no key. */
  .rtlink{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);
    border:1px solid var(--line);border-radius:12px;padding:.55rem 1rem;color:var(--fg);
    font-weight:700;font-size:.9rem;min-height:48px;touch-action:manipulation}
  .rtlink:active{transform:scale(.97);border-color:var(--accent2)}
  /* button row (Play · Mark-watched · RT-tomato-right); More-sources sits below.
     The compact "🍅 →" RT link is pushed to the right edge. */
  .actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
  .actions>*{margin:0!important}
  .card .actions{margin:.55rem .7rem 0}
  .detail .body>.actions{margin:.75rem 0 0}
  .actions .rtlink{margin-left:auto!important;padding:.55rem .8rem}
  .actions .play{max-width:none}
  /* metadata detail line on the search card: year-range · genres · runtime · ⭐ */
  .dline{color:var(--dim);font-size:.92rem;line-height:1.45}
  .card .dline{margin:.2rem .7rem 0}
  .detail .body>.dline{margin:.35rem 0 .1rem}
  /* 2026-07-13: Chromecast auto-track confirm prompt (slice 5). A house-TV
     session was detected as watched — but housemates use these TVs, so ASK
     before it enters Fredrik's ledger. */
  .pending{display:none;margin:.2rem 0 .6rem}
  .pending.on{display:block}
  .pending .rlab{color:var(--warn);font-size:.72rem;font-weight:800;letter-spacing:.05em;
    text-transform:uppercase;margin:.1rem .15rem .45rem}
  .pconf{display:flex;align-items:center;gap:.6rem;background:var(--bg2);
    border:1px solid var(--line);border-radius:12px;padding:.7rem .8rem;margin-bottom:.5rem}
  .pconf .pt{flex:1;min-width:0}
  .pconf .pt .a{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pconf .pt .b{color:var(--dim);font-size:.76rem;margin-top:.1rem}
  .pconf .pb{display:flex;gap:.5rem;flex:0 0 auto}
  .pconf .yes,.pconf .no{border-radius:10px;padding:.55rem .9rem;font-weight:700;font-size:.86rem;
    min-height:44px;display:flex;align-items:center;touch-action:manipulation}
  .pconf .yes{background:var(--good);color:#04120a}
  .pconf .no{background:var(--bg3);border:1px solid var(--line);color:var(--fg)}
  .pconf .yes:active,.pconf .no:active{transform:scale(.95)}

  /* ---- search detail (single result): adaptive, fills the width intelligently.
     2026-07-13: search renders ONE card (show + nested sources), so the shared
     auto-fill poster grid collapsed it into one 150px left column on desktop
     (80% of the screen empty) while the phone media query forced full width —
     backwards. Give search its own layout: poster left + body right on wide,
     sources in two columns when there's room; stacked full-width on phones. */
  .detail{max-width:940px}
  @media (min-width:641px){
    .detail .card{display:grid;grid-template-columns:210px 1fr;align-items:start;
      padding:.9rem;column-gap:1.2rem}
    .detail .card>.poster{width:210px;border-radius:12px;overflow:hidden;align-self:start}
    .detail .card>.body{display:flex;flex-direction:column;align-items:flex-start;min-width:0}
    .detail .body>.meta{padding:0}
    .detail .body>.meta .t{font-size:1.2rem;-webkit-line-clamp:3}
    .detail .body>.play{margin:.75rem 0 0;max-width:260px}
    .detail .body>.src-toggle{text-align:left;margin:.65rem 0 0}
    .detail .body>.sources{margin:.5rem 0 0;align-self:stretch}
    .detail .sources.open{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.45rem}
    .detail .src{font-size:.84rem}
  }

  /* ---- states ---- */
  .state{padding:3rem 1rem;text-align:center;color:var(--dim)}
  .libbar{display:flex;align-items:center;justify-content:space-between;color:var(--dim);font-size:.82rem;margin:.1rem .15rem .7rem}
  .srcbtn{background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:.45rem .9rem;color:var(--fg);font-weight:700;font-size:.85rem}
  .srcbtn:active{border-color:var(--accent2)}
  .state .big{font-size:1.05rem;color:var(--fg);font-weight:700;margin-bottom:.3rem}
  .skeleton .card .shimmer{display:block}
  .banner{position:sticky;top:0;z-index:30;background:var(--bad);color:#fff;
    padding:.6rem .9rem;display:none;align-items:center;gap:.6rem;font-size:.85rem;font-weight:600}
  .banner.on{display:flex}
  .banner button{margin-left:auto;background:rgba(255,255,255,.2);border-radius:8px;padding:.3rem .7rem;font-weight:700}
  .toast{position:fixed;left:50%;bottom:calc(8.5rem + var(--safe-b));transform:translateX(-50%);
    background:var(--bg3);border:1px solid var(--line);color:var(--fg);padding:.7rem 1rem;
    border-radius:12px;font-size:.85rem;max-width:90vw;z-index:40;opacity:0;pointer-events:none;
    transition:opacity .2s;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .toast.on{opacity:1}

  /* ---- now-playing bar + full view ---- */
  #nowbar{position:fixed;left:0;right:0;bottom:0;z-index:25;
    background:rgba(21,21,28,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:.55rem .7rem calc(.55rem + var(--safe-b));display:none;gap:.6rem;align-items:center}
  #nowbar.on{display:flex}
  #nowbar .mp{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--bg3);flex:none}
  #nowbar .nt{flex:1;min-width:0}
  #nowbar .nt .a{font-weight:700;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #nowbar .nt .b{color:var(--dim);font-size:.74rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tbtn{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;
    align-items:center;justify-content:center;font-size:1rem;flex:none}
  /* 2026-07-04: crisp <100ms tap feedback (NN/g 0.1s "feels instant" rule) —
     a clear press = color + scale-down, springs back on release. */
  .tbtn{transition:transform .08s ease, background .12s ease}
  .tbtn:active{background:var(--accent2);transform:scale(.88)}
  .tbtn.big{width:54px;height:54px;font-size:1.3rem;background:var(--accent2);color:#fff}
  .tbtn.big:active{transform:scale(.92);filter:brightness(1.15)}
  #nowbar.fading{opacity:.28;transition:opacity .28s ease}
  .nowfull{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1rem .5rem}
  .nowfull .bigposter{width:min(62vw,260px);aspect-ratio:2/3;border-radius:18px;object-fit:cover;
    background:var(--bg3);box-shadow:0 18px 50px rgba(0,0,0,.55)}
  .phvid{width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  /* 2026-07-04: live warmup progress (#warmup, all transcoded plays) + the
     phone-direct buffering overlay (#phbuf) over the <video> until first frame. */
  .phwrap{position:relative;width:min(94vw,640px);align-self:center}
  .phbuf{position:absolute;inset:0;justify-content:center;background:rgba(11,11,15,.78);border-radius:14px}
  .wbar{width:min(360px,80%);height:10px;border-radius:6px;background:var(--bg3);overflow:hidden;margin:.1rem 0}
  .wfill{height:100%;background:var(--warn);border-radius:6px;transition:width .45s ease}
  .nowfull h2{margin:.2rem 0 0;font-size:1.3rem;text-align:center}
  .nowfull .sub{color:var(--dim);font-size:.85rem;margin-top:-.4rem}
  .lu{width:1.05em;height:1.05em;display:inline-block;vertical-align:-.16em;flex:none;stroke:currentColor}
  nav a .lu,.seg button .lu{margin-right:.34em}
  .tgt .lu{margin-right:.4em}
  .topt .ic .lu{width:1.3em;height:1.3em;vertical-align:-.2em}
  .srcbtn .lu{margin-right:.35em}
  .scrub{width:min(92vw,420px)}
  .scrub .rail{position:relative;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
  .scrub .frontier{position:absolute;inset:0 0 0 0;background:var(--line)}
  .scrub .fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);width:0}
  .scrub input{width:100%;margin:.4rem 0 0;accent-color:var(--accent);background:transparent}
  .scrub .times{display:flex;justify-content:space-between;color:var(--dim);font-size:.76rem;margin-top:.1rem}
  .transport{display:flex;gap:.7rem;align-items:center;justify-content:center;margin-top:.3rem}
  .starting{display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--warn);
    font-weight:700;padding:1rem}
  .spin{width:26px;height:26px;border:3px solid var(--bg3);border-top-color:var(--warn);
    border-radius:50%;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  /* ---- target sheet ---- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none}
  .scrim.on{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--bg2);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    padding:1rem 1rem calc(1.2rem + var(--safe-b));transform:translateY(100%);
    transition:transform .22s ease;max-height:80vh;overflow:auto}
  .sheet.on{transform:none}
  .sheet h3{margin:.1rem 0 .8rem;font-size:1rem}
  .topt{display:flex;align-items:center;gap:.7rem;width:100%;background:var(--bg3);
    border:1px solid var(--line);border-radius:12px;padding:.85rem;margin-bottom:.5rem;text-align:left}
  .topt[disabled]{opacity:.5}
  .topt .ic{font-size:1.1rem}
  .topt .nm{font-weight:700}
  .topt .md{color:var(--dim);font-size:.76rem}
  .topt.sel{border-color:var(--accent);background:var(--accent2)}
  .topt .tag{margin-left:auto;font-size:.68rem;color:var(--dim2);border:1px solid var(--line);
    border-radius:6px;padding:.1rem .35rem}

  /* ===== Movie-night touch overrides (2026-05-18) =====================
     Research-backed: WCAG 2.5.5 AAA / Apple HIG = 44px min; this is a
     dim-room one-handed phone remote, so primary targets go WELL beyond
     (Fitts's law: bigger + spaced + edge-anchored = faster, fewer
     mistaps). Appended → later-cascade wins, original design intact,
     behaviour unchanged. touch-action:manipulation kills the 300ms tap
     delay + double-tap-zoom (snappier); inputs stay >=16px (no iOS
     focus-zoom); strong :active since touchless = no hover. */
  button,a,input,.card,.src,.topt,[role=button]{touch-action:manipulation}
  html,body{font-size:17px}
  nav{gap:.25rem;padding:.28rem}
  nav a{min-height:46px;display:flex;align-items:center;padding:.55rem 1.05rem;font-size:1rem}
  .seg button{min-height:46px;display:flex;align-items:center;padding:.5rem 1.15rem;font-size:1rem}
  .searchbar input{min-height:56px;font-size:1.05rem;padding:1rem 1.1rem}
  .tgt{min-height:44px;font-size:.92rem;padding:.5rem .8rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:1rem}
  .card .play{min-height:56px;display:flex;align-items:center;justify-content:center;
    margin:.6rem .7rem .75rem;font-size:1.02rem;border-radius:12px}
  .card .play:active{transform:scale(.97);background:var(--accent)}
  .src-toggle{min-height:44px;display:flex;align-items:center;justify-content:center;font-size:.92rem}
  .src{min-height:56px;font-size:.9rem;padding:.7rem .8rem;gap:.7rem}
  .src:active{transform:scale(.985);border-color:var(--accent)}
  .srcbtn{min-height:48px;font-size:.95rem;padding:.6rem 1.1rem}
  .meta .t{font-size:1.02rem}
  .meta .y{font-size:.86rem}
  #nowbar{padding:.7rem .8rem calc(.7rem + var(--safe-b));gap:.7rem}
  #nowbar .mp{width:52px;height:52px}
  #nowbar .nt .a{font-size:.98rem}
  #nowbar .nt .b{font-size:.82rem}
  .tbtn{width:60px;height:60px;font-size:1.5rem}
  .tbtn:active{transform:scale(.92);background:var(--accent)}
  .tbtn.big{width:88px;height:88px;font-size:2.1rem}
  .scrub{width:min(94vw,460px)}
  .scrub .rail{height:12px;border-radius:6px}
  .scrub input{min-height:48px;margin:.1rem 0 0}
  .scrub .times{font-size:.9rem;margin-top:.35rem}
  .transport{gap:1.1rem;margin-top:.6rem}
  .nowfull h2{font-size:1.5rem}
  .nowfull .bigposter{width:min(68vw,300px)}
  .topt{min-height:64px;padding:1rem;font-size:1rem}

  /* Persistent play-start error surface (2026-07-08, UX doc §6/§9) */
  .errbox{display:flex;flex-direction:column;align-items:center;gap:1rem;width:min(92vw,460px)}
  .errmsg{color:var(--warn);font-size:.98rem;text-align:center;line-height:1.45;
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:.9rem 1.1rem}
  .errbox .transport{flex-wrap:wrap}
  .srcbtn.primary{background:var(--accent2);color:#fff;border-color:transparent}
  .srcbtn.primary:active{background:var(--accent)}

  /* ===== Narrow-viewport (phone) layout fixes (2026-07-08) ==============
     Symptoms (Fredrik's phone screenshots): the header (brand + labelled
     nav pills + device pill) was wider than the viewport → the whole page
     scrolled sideways into dead black space; and a single search result sat
     in one ~168px grid column = ~half width. Fix: icon-only nav + device
     pill (labels recognizable by icon; active tab still shows via `.on`
     background), drop the "remote" sub-brand, single-column full-width
     search results, and a hard belt against any residual sideways scroll.
     Scoped to phones so desktop keeps labels + the multi-column grid. */
  @media (max-width:560px){
    .brand small{display:none}               /* drop " remote" — saves width */
    nav a .lbl{display:none}                 /* icon-only tabs */
    nav a{padding:.55rem .78rem}             /* compact square-ish pills */
    nav a .lu{margin-right:0}                /* no trailing gap w/ label gone */
    #tgtLabel{display:none}                  /* Chromecast pill = icon only */
    .tgt{max-width:none;padding:.5rem .72rem}
    .tgt .lu{margin-right:0}
    #v-search .grid{grid-template-columns:1fr}  /* full-width search result + sources */
  }
  /* Belt: nothing may create a sideways scroll (the header used to). `clip`
     (not `hidden`) so it doesn't become a scroll container / break the
     sticky header. The header now fits on its own; this just guarantees it. */
  html{overflow-x:clip}
  header{max-width:100%}
  .topt .ic{font-size:1.5rem}
  .topt .nm{font-size:1.02rem}
  .state{padding:3.5rem 1rem;font-size:1.02rem}
  .state .big{font-size:1.25rem}
  .starting{font-size:1.05rem}
  .spin{width:34px;height:34px}
  .banner{min-height:52px;font-size:.95rem}
  .banner button{min-height:40px;padding:.45rem 1rem}
  main{padding-bottom:9rem}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="banner" id="banner"><span id="bannerMsg">spela unreachable</span><button id="bannerRetry">Retry</button></div>

<header>
  <a href="#/search" class="brand" aria-label="spela — home">spela<small>remote</small></a>
  <nav>
    <a href="#/search" data-v="search" data-ic="search" aria-label="Search"><span class="lbl">Search</span></a>
    <a href="#/library" data-v="library" data-ic="library" aria-label="Library"><span class="lbl">Library</span></a>
    <a href="#/now" data-v="now" data-ic="tv" aria-label="Now playing"><span class="lbl">Now</span></a>
    <a href="#/towatch" data-v="towatch" data-ic="film" aria-label="To Watch"><span class="lbl">To Watch</span></a>
  </nav>
  <button class="tgt" id="tgtBtn" data-ic="cast" aria-label="Cast target"><b id="tgtLabel">Pick target</b></button>
</header>

<main>
  <section class="view" id="v-search">
    <div class="searchbar">
      <input id="q" type="search" inputmode="search" autocomplete="off"
        placeholder="Search a movie or show…" aria-label="Search">
      <div class="seg" id="modeSeg">
        <button data-m="movie" class="on" data-ic="film">Movies</button>
        <button data-m="tv" data-ic="tv">TV</button>
      </div>
    </div>
    <div id="pendingRow" class="pending"></div>
    <div id="recentRow" class="recent"></div>
    <div id="searchOut"></div>
  </section>

  <section class="view" id="v-library"><div id="libraryOut"></div></section>

  <section class="view" id="v-towatch"><div id="towatchOut"></div></section>

  <section class="view" id="v-now">
    <div id="nowFull"></div>
  </section>
</main>

<div id="nowbar">
  <img class="mp" id="nbPoster" alt="">
  <div class="nt"><div class="a" id="nbTitle">—</div><div class="b" id="nbState">—</div></div>
  <button class="tbtn" id="nbRestart" title="Restart from start" aria-label="Restart from start" data-ic="restart"></button>
  <button class="tbtn" id="nbPlay" title="Play/Pause" aria-label="Play/Pause" data-ic="pause"></button>
  <button class="tbtn" id="nbExpand" title="Open player" aria-label="Open player" data-ic="expand"></button>
</div>

<div class="toast" id="toast"></div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <h3>Where should it play?</h3>
  <div id="tgtList"><div class="state">Loading targets…</div></div>
</div>

<script type="module">
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const el=(t,p={})=>Object.assign(document.createElement(t),p);
// Route TMDB CDN posters through spela's self-hosted proxy+cache (/poster/...)
// so they're served from the LAN after the first view, not image.tmdb.org.
// Non-TMDB / already-local URLs pass through unchanged.
const posterSrc=u=>{ if(!u) return u;
  const m=/^https?:\/\/image\.tmdb\.org\/t\/p\/(.+)$/.exec(u); return m?"/poster/"+m[1]:u; };
const fmt=s=>{ s=Math.max(0,Math.round(s||0)); const h=s/3600|0,m=(s%3600)/60|0,x=s%60;
  return (h?h+":"+String(m).padStart(2,"0"):m)+":"+String(x).padStart(2,"0"); };

/* ---------- state ---------- */
const TKEY="spela_target", MKEY="spela_mode";
const S={
  target:JSON.parse(sessionStorage.getItem(TKEY)||"null"),   // {kind:'chromecast'|'phone', name}
  mode:sessionStorage.getItem(MKEY)||"movie",                 // 'movie' | 'tv'
  search:{q:"",abort:null,data:null},
  library:{data:null,loading:false},
  now:{data:null,posAbs:0,dur:0,frontier:0,endlist:false,playing:false,lastSync:0,
       everRan:false,cold:false,seekDrag:false,phone:false,
       warming:false,warmup:null,warmupData:null,   // 2026-07-04 live warmup progress
       error:null},   // 2026-07-08 persistent play-start failure {title,poster,msg,retry}
  pollTimer:null, frontierTimer:null, warmTimer:null,
  pending:null   // deferred play: tapped before a target was set → picker → resume
};

/* ---------- API client (abortable; network err -> banner) ---------- */
let reachable=true;
function setBanner(on,msg){ const b=$("#banner"); if(msg)$("#bannerMsg").textContent=msg;
  b.classList.toggle("on",on); }
async function api(path,{method="GET",body,signal}={}){
  try{
    const r=await fetch(path,{method,signal,
      headers:body?{"Content-Type":"application/json"}:undefined,
      body:body?JSON.stringify(body):undefined});
    const j=await r.json().catch(()=>({}));
    if(!reachable){reachable=true;setBanner(false);}
    return j;
  }catch(e){
    if(e.name==="AbortError") throw e;
    reachable=false; setBanner(true,"spela unreachable");
    throw e;
  }
}
$("#bannerRetry").onclick=()=>{ setBanner(false); route(); pollNow(true); };

let toastT;
// Open a source directly in VLC (native HEVC/Dolby-Vision decode, full seek, no
// HLS/browser transcode). Baseline: download a one-line .m3u that the OS hands
// to VLC. If a vlc:// protocol handler is installed (smoothest, true one-click),
// S.vlcScheme is set and we fire that instead. 2026-07-13.
async function openInVlc(id){
  let m3u;
  try{ const r=await fetch("/vlc/"+id+"/open.m3u"); if(!r.ok){ toast("Couldn't resolve that source"); return; } m3u=await r.text(); }
  catch(e){ toast("spela unreachable"); return; }
  const url=(m3u.split("\n").find(l=>l.startsWith("http"))||"").trim();
  if(!url){ toast("No stream URL"); return; }
  toast("Opening in VLC…");
  // Smoothest path: fire the vlc:// scheme (true one-click if the handler is
  // installed → VLC launches, window blurs). If no handler is registered (no
  // blur within 1.2s), fall back to downloading the .m3u, which the OS hands to
  // any installed player. Works with OR without the one-click handler.
  let blurred=false; const onblur=()=>{blurred=true;};
  window.addEventListener("blur",onblur,{once:true});
  window.location.href=url.replace(/^https?:\/\//,"vlc://");
  setTimeout(()=>{ window.removeEventListener("blur",onblur);
    if(!blurred) window.location.href="/vlc/"+id+"/open.m3u"; }, 1200);
}
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),4200); }

/* ---------- router ---------- */
function route(){
  const v=(location.hash.replace(/^#\//,"")||"search").split("?")[0];
  const known=["search","library","now","towatch"].includes(v)?v:"search";
  $$(".view").forEach(s=>s.classList.toggle("on",s.id==="v-"+known));
  $$("nav a").forEach(a=>a.classList.toggle("on",a.dataset.v===known));
  if(known==="now") renderNowFull();
  if(known==="library") renderLibrary();
  if(known==="search" && !S.search.q){ loadRecent(); loadPending(); }
  if(known==="towatch") renderToWatch();
}

// "To Watch" view — the recommender's to-watch list (slice 3 arsenal), from
// /watchlist (seeded from the RT import; curated by the Claude harness). Series
// + movies as tappable rows (RT critic score shown); already-watched are hidden.
// Tap → search that title. 2026-07-13.
async function renderToWatch(){
  const out=$("#towatchOut"); if(!out) return;
  out.innerHTML=`<div class="state">Loading…</div>`;
  let d; try{ d=await api("/watchlist"); }catch(e){ out.innerHTML=`<div class="state"><div class="big">spela unreachable</div></div>`; return; }
  const mk=(arr,isTV)=>(arr||[]).filter(x=>!x.watched).map(x=>{
    const r=el("button",{className:"src"});
    r.appendChild(el("span",{className:"q",textContent:x.title}));
    // year + real TMDB genre are filled in by enrichToWatchRow (the old hand-
    // written `note` was inconsistent + jargon-y, replaced by real genres).
    if(x.rt!=null) r.appendChild(el("span",{className:"s "+(x.rt>=88?"":"low"),textContent:"🍅 "+x.rt}));
    r.onclick=()=>{ setMode(isTV?"tv":"movie"); $("#q").value=x.title; S.search.q=x.title; location.hash="#/search"; runSearch(x.title); };
    enrichToWatchRow(r,x.title,isTV);
    return r;
  });
  const series=mk(d.series,true), movies=mk(d.movies,false);
  out.innerHTML="";
  const wrap=el("div",{className:"detail"});
  if(series.length){ wrap.appendChild(el("div",{className:"twhead",textContent:`Series · ${series.length}`}));
    const box=el("div",{className:"sources open"}); series.forEach(r=>box.appendChild(r)); wrap.appendChild(box); }
  if(movies.length){ wrap.appendChild(el("div",{className:"twhead",textContent:`Movies · ${movies.length}`}));
    const box=el("div",{className:"sources open"}); movies.forEach(r=>box.appendChild(r)); wrap.appendChild(box); }
  if(!series.length&&!movies.length) wrap.appendChild(el("div",{className:"state",textContent:"To-watch list is empty."}));
  out.appendChild(wrap);
}
// Lazily enrich a To-Watch row with its poster (as a half-faded background) and
// release year (after the title) — TMDB via /title-meta, cached server-side so
// it's one lookup per title then instant. Progressive: rows show immediately,
// posters/years fill in as they resolve. 2026-07-13.
async function enrichToWatchRow(row,title,isTV){
  let m; try{ m=await api("/title-meta?title="+encodeURIComponent(title)+(isTV?"&tv=1":"")); }catch{ return; }
  if(!m) return;
  const q=row.querySelector(".q");
  // live RT (MDBList) overrides the static curated score when present; also
  // gives a score to entries that had none.
  if(m.rt!=null){ let s=row.querySelector(".s"); if(!s){ s=el("span",{className:"s"}); row.appendChild(s); }
    s.textContent="🍅 "+m.rt; s.className="s "+(m.rt>=88?"":"low"); }
  if(m.year && q && !row.querySelector(".ty")) q.after(el("span",{className:"ty",textContent:String(m.year)}));
  if(m.genres && m.genres.length && !row.querySelector(".gx")){
    const g=el("span",{className:"x gx",textContent:m.genres.slice(0,2).join(", ")});
    (row.querySelector(".ty")||q).after(g);
  }
  if(!row.querySelector(".mx")){
    let extra="";
    if(isTV && m.seasons) extra=m.seasons+" season"+(m.seasons>1?"s":"");
    else if(m.runtime) extra=m.runtime+" min";
    if(extra){ const ex=el("span",{className:"mx",textContent:extra});
      (row.querySelector(".gx")||row.querySelector(".ty")||q).after(ex); }
  }
  if(isTV && m.status && !row.querySelector(".stx")){
    const st=({"Returning Series":"Returning","Ended":"Ended","Canceled":"Canceled",
      "In Production":"Upcoming","Planned":"Upcoming"})[m.status];
    if(st){ const sx=el("span",{className:"stx"+(st==="Returning"||st==="Upcoming"?" on":""),textContent:st});
      (row.querySelector(".mx")||row.querySelector(".gx")||row.querySelector(".ty")||q).after(sx); }
  }
  if(m.poster_url){ const ps=posterSrc(m.poster_url); const img=new Image();
    img.onload=()=>{ row.style.backgroundImage=`linear-gradient(90deg,rgba(15,15,20,.88),rgba(15,15,20,.62)),url('${ps}')`;
      row.style.backgroundSize="cover"; row.style.backgroundPosition="center 20%"; };
    img.src=ps; }
}
addEventListener("hashchange",route);

/* ---------- poster card (skeleton -> img | titled fallback) ---------- */
function posterCard({poster,title,year,cta,onPlay,sources,onMarkWatched,rtTitle,detailLine}){
  const c=el("div",{className:"card"});
  const p=el("div",{className:"poster"});
  const sh=el("div",{className:"shimmer"});
  p.appendChild(sh);
  if(poster){
    const img=el("img",{loading:"lazy",decoding:"async",alt:title||""});
    img.onload=()=>{img.classList.add("in");sh.remove();};
    img.onerror=()=>{sh.remove();p.appendChild(el("div",{className:"fallback",textContent:title||"Untitled"}));};
    img.src=posterSrc(poster); p.appendChild(img);
  }else{
    sh.remove(); p.appendChild(el("div",{className:"fallback",textContent:title||"Untitled"}));
  }
  c.appendChild(p);
  // Content wrapper: on the desktop search "detail" layout the card is a
  // 2-cell grid (poster | body); grouping the text/play/sources into one body
  // cell stops the tall poster from stretching per-row heights (title↔play gap).
  const body=el("div",{className:"body"}); c.appendChild(body);
  const m=el("div",{className:"meta"});
  m.appendChild(el("div",{className:"t",textContent:title||"Untitled"}));
  if(year) m.appendChild(el("div",{className:"y",textContent:year}));
  body.appendChild(m);
  // metadata detail line (year-range · genres · runtime · rating), below the
  // title + above the buttons — filled async by the caller (fillDetailLine).
  if(detailLine){ body.appendChild(el("div",{className:"dline"})); }
  // Button row: Play + Mark-watched, with the RT link a compact tomato pushed
  // to the right. "More sources" stays BELOW this row (appended after).
  const actions=el("div",{className:"actions"});
  if(onPlay){
    const b=el("button",{className:"play",textContent:cta||"Play"});
    b.onclick=()=>onPlay(); actions.appendChild(b);
  }
  if(onMarkWatched){
    const w=el("button",{className:"markw",textContent:"✓ Mark watched"});
    w.onclick=async()=>{ if(w.classList.contains("done")) return; w.disabled=true;
      const ok=await onMarkWatched();
      if(ok!==false){ w.textContent="✓ Watched"; w.classList.add("done"); } else { w.disabled=false; } };
    actions.appendChild(w);
  }
  if(rtTitle){
    const rt=el("a",{className:"rtlink",textContent:"🍅 →",title:"Open on Rotten Tomatoes",
      href:"https://www.rottentomatoes.com/search?search="+encodeURIComponent(rtTitle),
      target:"_blank",rel:"noopener"});
    actions.appendChild(rt);
  }
  if(actions.children.length) body.appendChild(actions);
  if(sources&&sources.length){
    const anyPartial=sources.some(s=>typeof s.partial_pct==="number");
    const collapsed=()=>`More sources (${sources.length})`+(anyPartial?" · ↓ resume available":"");
    const tg=el("button",{className:"src-toggle"+(anyPartial?" has-partial":""),textContent:collapsed()});
    const box=el("div",{className:"sources"});
    sources.forEach(r=>{
      const part=typeof r.partial_pct==="number";
      const sc=r.seeds??0;
      // seed health — mirrors the green "on disk" pattern. On-disk sources are
      // never "dead" (they play from the local file regardless of swarm).
      const health=part?"ok":(sc<5?"dead":sc<20?"low":"ok");
      const row=el("button",{className:"src"+(part?" partial":health==="dead"?" dead":"")});
      row.appendChild(el("span",{className:"q",textContent:r.quality||"?"}));
      if(part) row.appendChild(el("span",{className:"dl",textContent:r.partial_pct>=100?"✓ on disk":`↓ ${r.partial_pct}%`}));
      row.appendChild(el("span",{className:"x",textContent:codec(r.title)}));
      row.appendChild(el("span",{className:"x",textContent:r.size||""}));
      row.appendChild(el("span",{className:"x",textContent:r.source||""}));
      row.appendChild(el("span",{className:"s "+health,textContent:(health==="dead"?"⚠ ":"")+sc+"🌱"}));
      row.onclick=()=>doPlay({result_id:r.id});
      box.appendChild(row);
    });
    tg.onclick=()=>{box.classList.toggle("open");
      tg.textContent=(box.classList.contains("open")?"Hide sources":collapsed());};
    body.append(tg,box);
    c._openSources=()=>{box.classList.add("open");tg.textContent="Hide sources";};
  }
  return c;
}
const codec=t=>/(\bx265\b|\bh\.?\s?265\b|hevc)/i.test(t||"")?"HEVC"
  :/(\bx264\b|\bh\.?\s?264\b|avc)/i.test(t||"")?"H.264":"—";

/* ---------- search (debounced, abortable, Movies/TV) ---------- */
const seg=$("#modeSeg");
[...seg.children].forEach(b=>b.classList.toggle("on",b.dataset.m===S.mode));
seg.onclick=e=>{ const b=e.target.closest("button"); if(!b)return;
  S.mode=b.dataset.m; sessionStorage.setItem(MKEY,S.mode);
  [...seg.children].forEach(x=>x.classList.toggle("on",x===b));
  if(S.search.q) runSearch(S.search.q); };
function setMode(m){ S.mode=m; sessionStorage.setItem(MKEY,S.mode);
  [...seg.children].forEach(x=>x.classList.toggle("on",x.dataset.m===m)); }

// "Continue watching" row — spela-native tracker, slice 1. Shows the distinct
// titles played in spela over the last 14 days (from /recent); tap a chip to
// jump straight to that show's sources. Hides when there's no recent history.
async function loadRecent(){
  const row=$("#recentRow"); if(!row) return;
  let d; try{ d=await api("/recent"); }catch(e){ return; }
  const items=(d&&d.recent)||[];
  if(!items.length){ row.classList.remove("on"); row.innerHTML=""; return; }
  row.innerHTML=""; row.appendChild(el("div",{className:"rlab",textContent:"Recently watched"}));
  const chips=el("div",{className:"chips"});
  items.forEach(it=>{
    const c=el("button",{className:"chip"});
    c.innerHTML=esc(it.label)+(it.season?`<span class="ep">S${String(it.season).padStart(2,"0")}E${String(it.episode||0).padStart(2,"0")}</span>`:"");
    c.onclick=()=>{ setMode(it.season?"tv":"movie");
      $("#q").value=it.query; S.search.q=it.query; runSearch(it.query); };
    chips.appendChild(c);
  });
  row.appendChild(chips); row.classList.add("on");
}

// Chromecast auto-track confirm prompt (slice 5). The tracker detects
// near-complete sessions on the house TVs, but housemates watch those too — so
// nothing enters Fredrik's watched-ledger without a "Yes". Surfaced on the
// search/landing view; each item gets Yes (→ mark watched) / No (→ dismiss,
// won't re-nag that episode).
async function loadPending(){
  const row=$("#pendingRow"); if(!row) return;
  let d; try{ d=await api("/pending-watched"); }catch(e){ return; }
  const items=(d&&d.pending)||[];
  if(!items.length){ row.classList.remove("on"); row.innerHTML=""; return; }
  row.innerHTML=""; row.appendChild(el("div",{className:"rlab",textContent:"Watched on a TV? Confirm to track"}));
  items.forEach(it=>{
    const card=el("div",{className:"pconf"});
    const t=el("div",{className:"pt"});
    t.appendChild(el("div",{className:"a",textContent:it.title}));
    t.appendChild(el("div",{className:"b",textContent:"on "+(it.device||"a TV")}));
    card.appendChild(t);
    const pb=el("div",{className:"pb"});
    const yes=el("button",{className:"yes",textContent:"Yes"});
    const no=el("button",{className:"no",textContent:"No"});
    yes.onclick=()=>resolvePending(it.key,true,card);
    no.onclick=()=>resolvePending(it.key,false,card);
    pb.append(yes,no); card.appendChild(pb);
    row.appendChild(card);
  });
  row.classList.add("on");
}
async function resolvePending(key,watched,card){
  card.style.opacity=".4";
  try{ await api("/pending-watched/resolve",{method:"POST",body:{key,watched}}); }
  catch{ card.style.opacity="1"; toast("spela unreachable"); return; }
  card.remove();
  const row=$("#pendingRow");

// Fill the search-detail metadata line (year-range · genres · runtime/seasons ·
// TMDB rating) from the cached /title-meta arsenal. TMDB rating (⭐) is shown
// because a real RT score isn't available for arbitrary search results.
async function fillDetailLine(card, title, isTV){
  const dl=card.querySelector(".dline"); if(!dl) return;
  let m; try{ m=await api("/title-meta?title="+encodeURIComponent(title)+(isTV?"&tv=1":"")); }catch{ return; }
  if(!m) return;
  const parts=[];
  if(m.year) parts.push(String(m.year));
  if(m.genres&&m.genres.length) parts.push(m.genres.slice(0,3).join(", "));
  if(isTV && m.seasons) parts.push(m.seasons+" season"+(m.seasons>1?"s":""));
  else if(m.runtime) parts.push(m.runtime+" min");
  if(m.tmdb) parts.push("⭐ "+m.tmdb.toFixed(1));

  // the real RT page. Without a key m.rt is absent → the tomato stays a search
  // link (unchanged).
  if(m.rt!=null){ const rl=card.querySelector(".rtlink");

async function runSearch(q){

/* ---------- hybrid play ---------- */
/* ---------- Live warmup progress (2026-07-04) ----------
   All server-transcoded plays (chromecast, phone-direct, library) block in
   /play for the whole torrent-download + transcode pre-buffer + cast-LOAD
   window (30-60s+). Instead of leaving the user staring at the search view,
   we navigate to a live progress screen IMMEDIATELY and poll GET /progress
   every 1s while /play is awaited in the background. */
function beginWarming(title,poster){
  S.now.error=null;   // a fresh attempt clears any prior failure surface
  S.now.warming=true; S.now.warmup=null; S.now.warmupData={title:title||"Playing",poster:poster||""};
  S.now.data=null; S.now.phone=false;
  location.hash="#/now"; renderNowFull(); startWarmupPoll();
}
/* Persistent play-START failure surface (2026-07-08, UX doc §6/§9): a failed
   start is NOT a transient toast that bounces to Search (toast-only-critical is
   an anti-pattern — the recovery path vanishes). Instead keep the failed item +
   a "Tap to retry" ATTACHED to the now-playing surface until the user retries,
   goes back, or a fresh attempt clears it. */
function showPlayError(title,poster,msg,retry){
  endWarming();
  S.now.error={title:title||"Couldn’t start",poster:poster||"",msg:msg||"unknown error",retry:retry||null};
  S.now.data=null; S.now.phone=false; S.now.cold=false; S.now.playing=false;
  location.hash="#/now"; renderNowFull();
}
function endWarming(){ S.now.warming=false; stopWarmupPoll(); }
function startWarmupPoll(){ if(S.warmTimer)return; pollWarmup(); S.warmTimer=setInterval(pollWarmup,1000); }
function stopWarmupPoll(){ clearInterval(S.warmTimer); S.warmTimer=null; }
async function pollWarmup(){
  let p; try{ p=await api("/progress"); }catch{ return; }
  if(!p||!p.active) return;                 // do_play hasn't published yet (race) — keep last frame
  S.now.warmup=p;
  if(currentView()==="now" && S.now.warming) renderNowFull();
}
function fmtSpeed(bps){ if(!bps) return "0 KB/s"; const mb=bps/1e6;
  return mb>=1 ? mb.toFixed(1)+" MB/s" : Math.round(bps/1e3)+" KB/s"; }

async function doPlay(opts,cardForSources){
  if(!S.target){ S.pending=()=>doPlay(opts,cardForSources); toast("Pick where to play — it starts right after"); openSheet(); return; }
  if(S.target.kind==="phone"){ return doPhoneDirect(opts,cardForSources,(S.search.data&&S.search.data.show&&S.search.data.show.title)||""); }
  if(S.target.kind==="shannon"){ return doShannonPlay(opts,cardForSources); }
  if(S.target.kind==="vlc"){ if(opts.result_id!=null) return openInVlc(opts.result_id); toast("Tap a source (or Play best) to open it in VLC"); return; }
  const label=(S.search.data&&S.search.data.show&&S.search.data.show.title)||opts.title||"Playing";
  beginWarming(label,opts.poster_url);
  const body={...opts,target:"chromecast",cast_name:S.target.name};
  let r;
  try{ r=await api("/play",{method:"POST",body}); }
  catch{ showPlayError(label,opts.poster_url,"spela unreachable",()=>doPlay(opts,cardForSources)); return; }
  endWarming();
  if(r&&r.error){ showPlayError(label,opts.poster_url,r.error,()=>doPlay(opts,cardForSources)); return; }
  S.now.phone=false; S.now.cold=true; S.now.lastSync=0; S.now.playing=true; S.now.everRan=false;
  S.now.data={title:label,poster_url:opts.poster_url||"",quality:"",target:":"+(S.target&&S.target.name||"")};
  renderNowFull(); pollNow(true);
}

/* ---------- Shannon-TV playback (Phase-7 / target=shannon, 2026-05-23) ----------
   spela /play target=shannon → server POSTs to Shannon's
   shannon-kiosk-actions daemon /watch → Shannon's spela-local fetches
   HLS + decodes locally (HW via v4l2slh264dec when working, SW
   playbin3 fallback). The Darwin spela /status reflects Shannon's
   ACTIVE stream once spela-local's own /play call lands (typically
   within ~5s of the dispatch), so the now-playing UI populates
   shortly. */
async function doShannonPlay(opts,cardForSources){
  S.now.error=null;
  toast("Starting on Shannon TV…");
  let r;
  try{ r=await api("/play",{method:"POST",body:{...opts,target:"shannon"}}); }
  catch{ showPlayError(opts.title||"Shannon TV",opts.poster_url,"spela unreachable",()=>doShannonPlay(opts,cardForSources)); return; }
  if(r&&r.error){ showPlayError(opts.title||"Shannon TV",opts.poster_url,r.error,()=>doShannonPlay(opts,cardForSources)); return; }
  toast("Dispatched — Shannon will fetch + play in ~10s");
  S.now.phone=false; S.now.cold=true; S.now.lastSync=0; S.now.playing=true; S.now.everRan=false;
  location.hash="#/now"; pollNow(true);
}

/* ---------- Phone-direct playback (Phase 6 / US-5 / T-14,15) ----------
   Reuses the proven no-Chromecast HLS path (target:"vlc" → spela builds
   /hls/master.m3u8 but does not cast). iOS Safari plays HLS natively;
   Chromium lazy-loads a CDN-pinned hls.js. The <video> element IS the
   transport (native controls = scrub/seek/fullscreen). Single backend
   stream → switching target moves it (R-1). */
async function doPhoneDirect(opts,cardForSources,label){
  const old=$("#phvid"); if(old){ old.pause(); old.remove(); }   // fresh play → rebuild player
  // Live warmup screen (shared with chromecast/library) covers the ~10-15s
  // transcode-warmup await; on success we build the in-page <video>.
  beginWarming(label||opts.title||"Playing",opts.poster_url);
  let r;
  try{ r=await api("/play",{method:"POST",body:{...opts,target:"vlc"}}); }
  catch{ showPlayError(label||opts.title,opts.poster_url,"spela unreachable",()=>doPhoneDirect(opts,cardForSources,label)); return; }
  endWarming();
  if(r&&r.error){ showPlayError(label||opts.title,opts.poster_url,r.error,()=>doPhoneDirect(opts,cardForSources,label)); return; }
  S.now.phone=true; S.now.phoneLoading=false; S.now.everRan=true; S.now.playing=true;
  S.now.data={title:label||"Playing",quality:"",poster_url:opts.poster_url||""};
  renderNowFull();                                               // build the <video> + buffering overlay
  pollNow(true);
}
let _hlsLoading;
function attachPhoneVideo(v,src){
  if(!v) return;
  if(v.canPlayType("application/vnd.apple.mpegurl")){ v.src=src; v.play().catch(()=>{}); return; }
  const go=()=>{
    if(window.Hls&&Hls.isSupported()){
      // 2026-07-13: 4K HEVC segments are huge (7-16 MB each), so hls.js's
      // default unbounded buffer overflows Chrome's MSE SourceBuffer quota
      // (QuotaExceededError) → it stops appending → playback drains the buffer
      // → SPIN, and hls.js's recovery flushes + re-seeks → "jumped to a
      // different segment". Bound the buffer hard by BOTH seconds and bytes,
      // evict watched buffer, start at 0 (not the EVENT-playlist live edge,
      // which was the segment-jump), and self-heal fatal media/network errors.
      const h=new Hls({
        startPosition: 0,
        maxBufferLength: 12,
        maxMaxBufferLength: 24,
        backBufferLength: 12,
        maxBufferSize: 30*1000*1000
      });
      h.on(Hls.Events.ERROR,(_,d)=>{ if(!d.fatal) return;
        if(d.type===Hls.ErrorTypes.MEDIA_ERROR) h.recoverMediaError();
        else if(d.type===Hls.ErrorTypes.NETWORK_ERROR) h.startLoad(); });
      h.loadSource(src); h.attachMedia(v); h.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{})); }
    else { v.src=src; v.play().catch(()=>{}); }
  };
  if(window.Hls) return go();
  if(!_hlsLoading){ _hlsLoading=new Promise(res=>{ const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"; s.onload=res; s.onerror=res;
    document.head.appendChild(s); }); }
  _hlsLoading.then(go);
}

/* ---------- My Library (Phase 5 / US-3) ---------- */
async function doPlayLibrary(entry){
  if(!S.target){ S.pending=()=>doPlayLibrary(entry); toast("Pick where to play — it starts right after"); openSheet(); return; }
  if(S.target.kind==="phone"){ return doPhoneDirect({title:entry.raw_name,poster_url:entry.poster_url},null,entry.title); }
  if(S.target.kind==="shannon"){ return doShannonPlay({title:entry.raw_name,poster_url:entry.poster_url},null); }
  beginWarming(entry.title,entry.poster_url);
  let r;
  try{ r=await api("/play",{method:"POST",body:{title:entry.raw_name,poster_url:entry.poster_url,target:"chromecast",cast_name:S.target.name}}); }
  catch{ showPlayError(entry.title,entry.poster_url,"spela unreachable",()=>doPlayLibrary(entry)); return; }
  endWarming();
  if(r&&r.error){ showPlayError(entry.title,entry.poster_url,r.error,()=>doPlayLibrary(entry)); return; }
  S.now.phone=false; S.now.cold=true; S.now.lastSync=0; S.now.playing=true; S.now.everRan=false;
  S.now.data={title:entry.title,poster_url:entry.poster_url||"",quality:"",target:":"+(S.target&&S.target.name||"")};
  renderNowFull(); pollNow(true);
}
async function renderLibrary(force){
  const out=$("#libraryOut"); if(!out) return;
  if(S.library.loading) return;
  if(S.library.data && !force){ paintLibrary(); return; }
  S.library.loading=true;
  out.innerHTML='<div class="grid">'+
    '<div class="card"><div class="poster"><div class="shimmer"></div></div><div class="meta"><div class="t">&nbsp;</div></div></div>'.repeat(6)+'</div>';
  let d;
  try{ d=await api("/library"); }
  catch{
    S.library.loading=false; S.library.data=null;
    out.innerHTML=`<div class="state"><div class="big">spela unreachable</div>Can’t reach the server.<div style="margin-top:.7rem"><button class="srcbtn" id="libRetry">${ic("refresh")}Retry</button></div></div>`;
    $("#libRetry").onclick=()=>renderLibrary(true); return;
  }
  S.library.loading=false; S.library.data=d; paintLibrary();
}
function paintLibrary(){
  const out=$("#libraryOut"); if(!out) return;
  const d=S.library.data||{}, lib=Array.isArray(d.library)?d.library:[];
  // A real /library payload always carries library[] and/or origin_status.
  // Its absence = server down / 404 / malformed → "unreachable" (NOT "empty":
  // mislabeling couldn't-load as empty is the exact ambiguous-state the spec
  // forbids).
  if(!Array.isArray(d.library) && typeof d.origin_status!=="string"){
    out.innerHTML=`<div class="state"><div class="big">spela unreachable</div>Couldn’t load your library.<div style="margin-top:.7rem"><button class="srcbtn" id="libRetry">${ic("refresh")}Retry</button></div></div>`;
    $("#libRetry").onclick=()=>renderLibrary(true); return;
  }
  // AC-3.4: "offline" (origin unreachable) is a DISTINCT state from "empty".
  if(d.origin_status==="offline" && !lib.length){
    out.innerHTML=`<div class="state"><div class="big">Library offline</div>Your library host isn’t reachable right now — Search still works.<div style="margin-top:.7rem"><button class="srcbtn" id="libRetry">${ic("refresh")}Retry</button></div></div>`;
    $("#libRetry").onclick=()=>renderLibrary(true); return;
  }
  if(!lib.length){
    out.innerHTML=`<div class="state"><div class="big">Library is empty</div>Nothing in your curated library yet.</div>`; return;
  }
  out.innerHTML="";
  const bar=el("div",{className:"libbar"});
  bar.appendChild(el("span",{textContent:`${lib.length} in library`}));
  const rb=el("button",{className:"srcbtn",textContent:"↻ Refresh"});
  rb.onclick=()=>renderLibrary(true); bar.appendChild(rb);
  const grid=el("div",{className:"grid"});
  lib.forEach(e=>grid.appendChild(posterCard({
    poster:e.poster_url, title:e.title, year:e.year, cta:"Play",
    onPlay:()=>doPlayLibrary(e)
  })));
  out.append(bar,grid);
}

const AUDIO_RE=/(group|stereo|speaker|\baudio\b|\bmini\b|home(?!.*hub)|\bnest\b(?!.*hub))/i;
const VIDEO_RE=/(chromecast|google tv|androidtv|\bnest hub\b|shield|\btv\b)/i;
function isAudioOnly(d){ const n=d.name||"",m=d.model||"";
  if(VIDEO_RE.test(m)||VIDEO_RE.test(n)) return false;        // keep anything clearly video
  return AUDIO_RE.test(m)||AUDIO_RE.test(n);                  // filter only clear audio; ambiguous kept
}

    sh.onclick=()=>{ const moving=!!S.now.data, resume=S.pending; S.pending=null;
      S.target={kind:"shannon",name:"Shannon TV"};
      sessionStorage.setItem(TKEY,JSON.stringify(S.target)); tgtLabel(); closeSheet();
      if(resume) resume();
      else if(moving) toast("Single stream — your next play moves it to Shannon"); };
    list.appendChild(sh);
  }).catch(()=>{ list.innerHTML=`<div class="state">spela unreachable — can’t list targets.</div>`; });
}

/* ---------- now-playing: status poll (visibility+active gated) ---------- */
function startPolling(){ if(S.pollTimer)return; S.pollTimer=setInterval(()=>pollNow(false),3000); }
function stopPolling(){ clearInterval(S.pollTimer); S.pollTimer=null; }
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"){ pollNow(true); }
  else stopPolling();
});

async function pollNow(force){
  if(S.now.warming) return;   // 2026-07-04: the warmup poll owns the screen until /play resolves
  if(document.visibilityState!=="visible"&&!force) return;
  let s; try{ s=await api("/status"); }catch{ return; }
  if(!s||s.status==="idle"||!s.current){
    S.now.data=null; S.now.playing=false; S.now.phone=false; stopPolling();
    $("#nowbar").classList.remove("on"); renderNowFull(); return;
  }
  const c=s.current, was=S.now.data;
  // A re-play / seek-restart keeps the title but changes started_at — both
  // signal a fresh stream.
  const newStream = !was || was.title!==c.title || was.started_at!==c.started_at;
  S.now.data=c; S.now.dur=c.duration||0;
  if(newStream){
    S.now.frontier=0; S.now.endlist=false; S.now.posAbs=0;
    S.now.everRan=false; S.now.playing=true;   // a fresh stream starts playing
  }
  if(s.running) S.now.everRan=true;            // sticky: once live, never "cold" again

  // Cold-start is a TIME-BOUNDED startup phase, NOT merely "running:false".
  // A fast bridge/local play fully transcodes then ffmpeg EXITS
  // (running:false / process_dead) while the Chromecast keeps playing or
  // pausing the COMPLETE HLS perfectly — that is an ESTABLISHED,
  // fully-controllable stream, not "Starting…". Only treat as cold during
  // the genuine initial window (never-ran, no ENDLIST, < 75 s old).
  const age = c.started_at ? (Date.now()-Date.parse(c.started_at))/1000 : 1e9;
  S.now.cold = !s.running && !S.now.everRan && !S.now.endlist && age < 75;
  if(S.now.phone) S.now.cold=false;   // phone-direct: the <video> owns buffering, never "Starting…"

  // Position resync is independent of play/pause. /status carries NO
  // play-state field, so S.now.playing is driven SOLELY by user intent
  // (togglePlay) and is intentionally NEVER overwritten here — the old
  // code reasserted playing=true every poll, which made every tap re-send
  // /pause and left /resume permanently unreachable.
  if(!S.now.cold && !S.now.phone){
    try{
      const p=await api(`/api/position?imdb_id=${encodeURIComponent(c.imdb_id||"")}&title=${encodeURIComponent(c.title||"")}`);
      if(p&&typeof p.t==="number"&&p.t>=0){ S.now.posAbs=p.t; S.now.lastSync=Date.now(); }
    }catch{}
  }
  startPolling();
  if(S.now.phone) $("#nowbar").classList.remove("on"); else $("#nowbar").classList.add("on");
  // Do NOT rebuild the now-view DOM while the user is dragging the
  // scrubber — renderNowFull() recreates #fSeek via innerHTML, which
  // yanks the slider out from under the finger every 3s poll. The 1s
  // interpolation timer already respects seekDrag the same way.
  updateNowBar(); if(currentView()==="now" && !S.now.seekDrag) renderNowFull();
  pollFrontier();
}
const currentView=()=>(location.hash.replace(/^#\//,"")||"search").split("?")[0];

/* derive transcoded frontier from the live HLS media playlist (no /status
   field exists for it): Σ #EXTINF = stream secs transcoded so far,
   #EXT-X-ENDLIST = whole file done -> full scrub allowed. Absolute episode
   frontier = ss_offset + Σ. */
async function pollFrontier(){
  if(S.now.endlist||!S.now.data) return;
  if(S.frontierTimer&&Date.now()-S.frontierTimer<9000) return;
  S.frontierTimer=Date.now();
  try{
    // The media-playlist name VARIES: ffmpeg's `-var_stream_map` emits a
    // MULTI-variant master -> the real media playlist is `stream_0.m3u8`,
    // NOT `playlist.m3u8` (which 404s -> frontier stuck at 0 -> seekMax
    // falls back to full duration -> the scrubber lets you skip past the
    // transcoded edge and the seek silently no-ops). Derive the real
    // media playlist from the master's FIRST variant URI so this works
    // for single-variant (playlist.m3u8) AND multi-variant masters alike.
    const mtxt=await fetch("/hls/master.m3u8",{cache:"no-store"}).then(r=>r.ok?r.text():"");
    let media="playlist.m3u8";
    for(const ln of mtxt.split(/\r?\n/)){
      const s=ln.trim();
      if(s&&!s.startsWith("#")){ media=s; break; }   // first non-comment line = first variant URI
    }
    const txt=await fetch("/hls/"+media,{cache:"no-store"}).then(r=>r.ok?r.text():"");
    if(!txt) return;
    let sum=0; for(const m of txt.matchAll(/#EXTINF:([\d.]+)/g)) sum+=parseFloat(m[1])||0;
    S.now.frontier=(S.now.data.ss_offset||0)+sum;
    S.now.endlist=/#EXT-X-ENDLIST/.test(txt);
  }catch{}
}

function livePos(){
  // interpolate forward while playing; never past the seekable max
  let p=S.now.posAbs;
  if(S.now.playing&&S.now.lastSync) p+=(Date.now()-S.now.lastSync)/1000;
  return Math.min(p,seekMax());
}
function seekMax(){ return S.now.endlist? (S.now.dur||0)
  : (S.now.frontier>0? S.now.frontier : (S.now.dur||0)); }

function updateNowBar(){
  const c=S.now.data; if(!c)return;
  $("#nbPoster").src=posterSrc(c.poster_url||""); $("#nbTitle").textContent=c.title||"—";
  $("#nbState").textContent = S.now.cold ? "Starting…"
    : `${fmt(livePos())} / ${fmt(S.now.dur)}`;
  $("#nbPlay").innerHTML = S.now.cold ? "…" : ic(S.now.playing?"pause":"play");
}

/* ---------- now-playing: full view + scrubber ---------- */
/* 2026-07-04: live warmup screen — phase label + progress bar + second-by-second
   stats (download %/speed/peers OR transcode segments), fed by GET /progress. */
function renderWarmupInto(root){
  const w=S.now.warmup||{}, wd=S.now.warmupData||{};
  const title=w.title||wd.title||"Loading…", poster=wd.poster||"";
  const phase=w.phase||"connecting", t=w.torrent;
  let label, barPct=null, sub="";
  if(phase==="downloading" && t){
    label="Downloading…";
    barPct=Math.max(0,Math.min(100,t.percent||0));
    sub=`${fmtSpeed(t.speed_bps)} · ${t.peers||0} peer${t.peers===1?"":"s"}`;
  }else if(phase==="transcoding"){
    label="Preparing video…";
    const segs=w.segments||0;
    barPct=Math.max(0,Math.min(100,segs/20*100));   // ~20-segment cast pre-buffer
    sub=`${segs} segment${segs===1?"":"s"} ready`+((t&&!t.finished)?` · downloading ${Math.round(t.percent||0)}%`:"");
  }else{
    label="Connecting to peers…";
    sub=t?`${t.peers||0} peer${t.peers===1?"":"s"}`:"finding sources";
  }
  const el=(w.elapsed_secs!=null)?` · ${w.elapsed_secs}s`:"";
  root.innerHTML=`<div class="nowfull" id="warmup">
    ${poster?`<img class="bigposter" src="${esc(posterSrc(poster))}" alt="">`:""}
    <h2>${esc(title)}</h2>
    <div class="starting"><div class="spin"></div>${esc(label)}</div>
    ${barPct!=null?`<div class="wbar"><div class="wfill" style="width:${barPct}%"></div></div>`:""}
    <div class="sub">${esc(sub)}${el}</div>
    <div class="transport"><button class="srcbtn" id="wCancel">${ic("stop")}Cancel</button></div>
  </div>`;
  const cb=$("#wCancel");
  if(cb) cb.onclick=async()=>{ endWarming(); S.now.data=null;
    await api("/stop",{method:"POST"}).catch(()=>{}); location.hash="#/search"; };
}
function renderNowFull(){
  const root=$("#nowFull");
  if(S.now.warming){ renderWarmupInto(root); return; }   // 2026-07-04 live warmup screen
  if(S.now.error){                                       // 2026-07-08 persistent play-start failure
    const e=S.now.error;
    root.innerHTML=`<div class="nowfull">
      ${e.poster?`<img class="bigposter" src="${esc(posterSrc(e.poster))}" alt="">`:""}
      <h2>${esc(e.title)}</h2>
      <div class="errbox">
        <div class="errmsg">Couldn’t start — ${esc(e.msg)}</div>
        <div class="transport">
          ${e.retry?`<button class="srcbtn primary" id="errRetry">${ic("refresh")}Tap to retry</button>`:""}
          <button class="srcbtn" id="errBack">${ic("search")}Back to search</button>
        </div>
      </div>
    </div>`;
    const rb=$("#errRetry"); if(rb) rb.onclick=()=>{ const fn=e.retry; S.now.error=null; if(fn) fn(); };
    $("#errBack").onclick=()=>{ S.now.error=null; location.hash="#/search"; };
    return;
  }
  const c=S.now.data;
  if(!c){ root.innerHTML=`<div class="state"><div class="big">Nothing playing</div>Start something from Search.</div>`; return; }
  if(S.now.phone){
    if($("#phvid")) return;   // built once — poll re-renders must NOT rebuild the playing <video>
    root.innerHTML=`<div class="nowfull">
      <h2>${esc(c.title||"")}</h2>
      <div class="sub">${esc(c.quality||"")} · on this device</div>
      <div class="phwrap">
        <video id="phvid" class="phvid" controls playsinline autoplay></video>
        <div id="phbuf" class="starting phbuf"><div class="spin"></div>Buffering…</div>
      </div>
      <div class="transport">
        <button class="tbtn" id="phStop" title="Stop" aria-label="Stop">${ic("stop")}</button>
        <button class="srcbtn" id="phTo">${ic("tv")}Move to a TV…</button>
      </div>
      <div class="sub">Single backend stream — moving to a TV stops it here.</div>
    </div>`;
    attachPhoneVideo($("#phvid"),"/hls/master.m3u8");
    { const vEl=$("#phvid"); if(vEl) vEl.addEventListener("playing",()=>{ const b=$("#phbuf"); if(b) b.remove(); },{once:true}); }
    $("#phStop").onclick=async()=>{ const v=$("#phvid"); if(v){ v.pause(); v.remove(); }
      await api("/stop",{method:"POST"}).catch(()=>{});
      S.now.phone=false; S.now.data=null; $("#nowbar").classList.remove("on"); stopPolling(); renderNowFull(); };
    $("#phTo").onclick=()=>{ const v=$("#phvid"); if(v) v.pause(); openSheet(); };
    return;
  }
  if(S.now.cold){
    root.innerHTML=`<div class="nowfull">
      <img class="bigposter" src="${esc(posterSrc(c.poster_url||""))}" alt="">
      <h2>${esc(c.title||"")}</h2>
      <div class="starting"><div class="spin"></div>Starting on ${esc((c.target||"").split(":")[1]||S.target?.name||"TV")}…</div>
      <div class="sub">Cold-start can take up to a minute — this is normal, not an error.</div>
    </div>`;
    return;
  }
  const max=seekMax(), pos=livePos(), pct=max?Math.min(100,pos/max*100):0;
  const fpct=(S.now.dur&&!S.now.endlist&&S.now.frontier)?Math.min(100,S.now.frontier/S.now.dur*100):100;
  root.innerHTML=`<div class="nowfull">
    <img class="bigposter" src="${esc(posterSrc(c.poster_url||""))}" alt="">
    <h2>${esc(c.title||"")}</h2>
    <div class="sub">${esc(c.quality||"")} · ${esc((c.target||"").split(":")[1]||"")}</div>
    <div class="scrub">
      <div class="rail"><div class="frontier" style="width:${fpct}%"></div><div class="fill" id="fFill" style="width:${pct}%"></div></div>
      <input id="fSeek" type="range" min="0" max="${Math.max(1,Math.round(S.now.dur||max))}" value="${Math.round(pos)}">
      <div class="times"><span id="fCur">${fmt(pos)}</span><span>${fmt(S.now.dur)}</span></div>
    </div>
    <div class="transport">
      <button class="tbtn" id="tRestart" title="Restart from start" aria-label="Restart from start">${ic("restart")}</button>
      <button class="tbtn big" id="tPlay" aria-label="Play/Pause">${ic(S.now.playing?"pause":"play")}</button>
      <button class="tbtn" id="tStop" title="Stop" aria-label="Stop">${ic("stop")}</button>
    </div>
    ${!S.now.endlist&&S.now.frontier?`<div class="sub">Seekable up to ${fmt(S.now.frontier)} (still transcoding)</div>`:""}
  </div>`;
  const sl=$("#fSeek");
  sl.addEventListener("input",()=>{ S.now.seekDrag=true;
    const v=+sl.value; $("#fCur").textContent=fmt(v);
    $("#fFill").style.width=(max?Math.min(100,v/max*100):0)+"%"; });
  sl.addEventListener("change",async()=>{
    const v=+sl.value;
    S.now.seekDrag=false; S.now.posAbs=v; S.now.lastSync=Date.now();
    // Past the transcoded frontier while still transcoding → RE-TRANSCODE
    // from there (user's "play from that time", NOT clamp-to-edge).
    // BEFORE the transcode's start point (ss_offset — e.g. an auto-resume
    // started at 1:40 and you rewind toward 0) → ALSO re-transcode: cast.seek
    // can't go before where ffmpeg's -ss began, so within-window /seek would
    // fail "Cannot seek to Ns". 2026-07-04: rewind-to-start must always work.
    // Within the window (or whole file done) → instant cast.seek.
    const ssOffset = (S.now.data && S.now.data.ss_offset) || 0;
    const pastFrontier = !S.now.endlist && S.now.frontier>0 && v>S.now.frontier;
    const beforeStart = v < ssOffset - 1;
    if(pastFrontier || beforeStart){
      toast(`Transcoding from ${fmt(v)}…`);
      const r=await api("/seek-retranscode",{method:"POST",body:{t:v}}).catch(()=>({error:"unreachable"}));
      if(r&&r.error){ toast("Couldn’t seek there: "+r.error); }
      else { S.now.cold=true; S.now.everRan=false; S.now.lastSync=0;
             S.now.frontier=0; S.now.endlist=false; pollNow(true); }
    } else {
      const r=await api("/seek",{method:"POST",body:{seconds:v}}).catch(()=>({error:"unreachable"}));
      if(r&&r.error) toast("Seek failed: "+r.error);
    }
  });
  $("#tRestart").onclick=restart;
  $("#tStop").onclick=stopPlayback;
  $("#tPlay").onclick=togglePlay;
}

/* optimistic transport: reflect intent instantly, reconcile on next poll */
async function transport(path){ await api(path,{method:"POST"}).catch(()=>toast("spela unreachable"));
  setTimeout(()=>pollNow(true),600); }
/* Graceful stop (2026-07-04): the OLD stop awaited /stop then snapped to
   "Nothing playing" — no feedback, and (pre-backend-fix) the Chromecast kept
   playing. Now: optimistically fade the now-playing surface the instant you tap
   (the fade-out IS the confirmation — NN/g: smooth transition, not a snap), a
   brief "Stopped" toast, and the backend stops the cast itself. */
async function stopPlayback(){
  if(S.now.stopping) return;
  S.now.stopping=true; stopPolling();
  const nf=$("#nowFull");
  if(nf){ nf.style.transition="opacity .28s ease"; nf.style.opacity=".28"; }
  $("#nowbar").classList.add("fading");
  const v=$("#phvid"); if(v){ try{ v.pause(); }catch(e){} }   // phone-direct: silence local playback immediately
  await api("/stop",{method:"POST"}).catch(()=>{});
  toast("Stopped");
  S.now.data=null; S.now.phone=false; S.now.playing=false; S.now.stopping=false; S.now.error=null;
  $("#nowbar").classList.remove("on","fading");
  if(nf) nf.style.opacity="";
  renderNowFull();
}
async function togglePlay(){
  const toPause=S.now.playing;
  S.now.playing=!toPause;
  if(!toPause){ S.now.lastSync=Date.now(); }   // resuming: restart interpolation clock
  updateNowBar(); if(currentView()==="now") renderNowFull();
  await api(toPause?"/pause":"/resume",{method:"POST"}).catch(()=>toast("spela unreachable"));
  setTimeout(()=>pollNow(true),900);           // re-sync position only; never play-state
}
async function restart(){
  S.now.posAbs=0; S.now.lastSync=Date.now(); S.now.playing=true;
  updateNowBar(); if(currentView()==="now") renderNowFull();
  const r=await api("/seek",{method:"POST",body:{seconds:0}}).catch(()=>({error:"unreachable"}));
  if(r&&r.error) toast("Restart failed: "+r.error); else toast("Rewound to the start");
}
$("#nbRestart").onclick=restart;
$("#nbPlay").onclick=()=>{ if(!S.now.cold) togglePlay(); };
$("#nbExpand").onclick=()=>location.hash="#/now";
// Tap anywhere on the now-bar (poster/title) opens the full player;
// taps on its buttons keep their own action (closest() walks up from
// the inner SVG icon to the button, so this guard is icon-safe).
$("#nowbar").addEventListener("click",e=>{ if(e.target.closest("button")) return; location.hash="#/now"; });

/* tick the now-bar/full view between polls so interpolation stays smooth */
setInterval(()=>{ if(S.now.data&&!S.now.cold&&!S.now.seekDrag){
  updateNowBar(); if(currentView()==="now"){ const f=$("#fFill"),cu=$("#fCur"),sl=$("#fSeek");
    if(f&&cu&&sl){ const p=livePos(),m=seekMax(); f.style.width=(m?Math.min(100,p/m*100):0)+"%";
      cu.textContent=fmt(p); if(!S.now.seekDrag) sl.value=Math.round(p); } } } },1000);

/* logo → home: navigate to the search landing AND reset any active search
   (clear the box + result so the recently-watched / to-confirm bars return). */
$(".brand")?.addEventListener("click",()=>{ $("#q").value=""; S.search.q="";
  $("#searchOut").innerHTML=""; if(currentView()==="search"){ loadRecent(); loadPending(); } });

/* ---------- boot ---------- */
iconizeStatic(); route(); pollNow(true);
</script>
