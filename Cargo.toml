[package]
name = "spela"
version = "3.1.0"
edition = "2021"
description = "AI-agent-ready media controller — search, stream, cast"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
rust_cast = "0.21"
mdns-sd = "0.18"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
tower-http = { version = "0.6", features = ["cors"] }
dirs = "6"
tokio-stream = "0.1"
bytes = "1"

[dev-dependencies]
# mtime manipulation for disk-prune regression tests (Apr 15, 2026)
filetime = "0.2"
tempfile = "3.27.0"

[profile.release]
strip = true
lto = true
opt-level = "z"
