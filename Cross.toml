# cross-rs config for the Shannon thin-renderer aarch64 build (kiosk Phase 7).
#
# WHY: reqwest keeps default-tls (native-tls → openssl-sys) on Linux — the
# rustls unification was tried (f09f083) and reverted (f08f8d6) because the
# -no-provider variant broke the live server's TLS at runtime. So the
# aarch64 cross-build needs aarch64 OpenSSL dev libs IN the cross-rs
# container (its default aarch64-unknown-linux-gnu image lacks them →
# `openssl-sys` fails: "No such file or directory"). pre-build installs
# the arm64 multiarch libssl-dev + pkg-config; PKG_CONFIG_ALLOW_CROSS=1
# lets openssl-sys's pkg-config probe resolve the aarch64 lib.
#
# Mirrors the canonical 35-spotifyd-cross-install.sh Cross.toml pattern
# (arm64 dev libs via pre-build). aws-lc-rs's C/asm still builds with the
# toolchain already in cross's default image — only OpenSSL was missing.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends libssl-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS=1"]
